workflows:
  ios-android-workflow:
    name: Thermommatter AI iOS & Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      # ── 1. Dependencias Flutter ──────────────────────────────────────────
      # flutter pub get genera ios/Flutter/Generated.xcconfig con la ruta
      # correcta de Flutter en el builder de Codemagic. Sin este paso,
      # CocoaPods no puede localizar xcode_backend.rb y falla.
      - name: Get Flutter packages
        script: |
          cd APP
          flutter pub get

      # ── 2. Pod install ───────────────────────────────────────────────────
      # Debe ejecutarse DESPUÉS de flutter pub get (que genera los archivos
      # Flutter/Generated.xcconfig y .flutter-plugins que CocoaPods necesita).
      # CORRECCIÓN: este paso faltaba completamente en el yaml original,
      # lo que causaba el error "cannot load such file -- xcode_backend.rb".
      - name: Install iOS pods
        script: |
          cd APP/ios
          pod install

      # ── 3. Build Android APK ────────────────────────────────────────────
      - name: Build Android APK
        script: |
          cd APP
          flutter build apk --release --no-shrink

      # ── 4. Build iOS ─────────────────────────────────────────────────────
      - name: Build iOS (Release)
        script: |
          cd APP
          flutter build ios --release --no-codesign
      
      - name: Package as IPA
        script: |
          cd APP/build/ios/Release-iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ThermommatterAI.ipa Payload
    
    artifacts:
      - APP/build/app/outputs/flutter-apk/*.apk
      - APP/build/ios/Release-iphoneos/*.ipa

    publishing:
      email:
        recipients:
          - fcastanoe@unal.edu.co
